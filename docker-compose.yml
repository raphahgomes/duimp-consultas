# ============================================================================
# Bot DUIMP — Docker Compose (produção completa)
# ============================================================================
# Serviços: Nginx · Django/Gunicorn · Celery Worker · Flower · PostgreSQL · Redis
# ============================================================================

services:
  # ── Nginx — Reverse Proxy + Static Files ────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

  # ── Django / Gunicorn — Aplicação Web ───────────────────────────────────
  web:
    build: .
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - RUN_MIGRATIONS=true
    volumes:
      - static_files:/app/staticfiles
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-sf",
          "-o",
          "/dev/null",
          "http://localhost:8000/login/",
        ]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  # ── Celery Worker — Processamento Assíncrono ────────────────────────────
  celery:
    build: .
    command: celery -A botduimp worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Flower — Monitoramento Celery ───────────────────────────────────────
  flower:
    build: .
    command: celery -A botduimp flower --port=5555 --url_prefix=flower
    env_file: .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL — Banco de Dados ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-botduimp}
      POSTGRES_USER: ${DB_USER:-botduimp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-botduimp_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-botduimp}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis — Broker de Mensagens ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
  static_files:
