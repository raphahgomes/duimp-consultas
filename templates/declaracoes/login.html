{% extends "base.html" %}{% block title %}Entrar — DUIMP - Consultas{% endblock %}{% block content %}
<div
  class="max-w-md mx-auto mt-8 bg-white/95 rounded-2xl shadow-xl ring-1 ring-slate-200 p-8"
>
  <p class="text-xs font-semibold uppercase tracking-[0.24em] text-cyan-700 mb-3">DUIMP - Consultas</p>
  <h1 class="text-2xl font-bold text-gray-800 mb-2">Entrar</h1>
  <p class="text-sm text-gray-500 mb-6">
    Acesse o sistema com seu usuário e senha.
  </p>

  <form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1"
        >Usuário</label
      >
      <input
        type="text"
        name="username"
        required
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"
      />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
      <input
        type="password"
        name="password"
        required
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"
      />
    </div>
    <button
      type="submit"
      class="w-full bg-slate-950 hover:bg-slate-800 text-white text-sm font-semibold px-4 py-2.5 rounded-lg transition"
    >
      Entrar
    </button>
  </form>
</div>
{% endblock %}
